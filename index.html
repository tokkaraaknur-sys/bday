<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днем Рождения! 🎁</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
        }
        .game-container { text-align: center; max-width: 90%; }
        
        /* Стили для игры */
        .cake-btn {
            font-size: 7rem; cursor: pointer; user-select: none;
            transition: transform 0.1s ease; display: inline-block;
            margin: 20px 0; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }
        .cake-btn:active { transform: scale(0.8); }
        .score-board { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; }
        .hint { font-size: 1.2rem; opacity: 0.9; }

        /* Стили для финального поздравления */
        .hidden { display: none; }
        .title { font-size: 3.5rem; margin-bottom: 15px; animation: bounce 2s infinite; }
        .text { font-size: 1.8rem; line-height: 1.5; max-width: 600px; margin: 0 auto; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

<div class="game-container">
    <div id="game-block">
        <div class="score-board">Собери угощения: <span id="score">0</span> / 10</div>
        <p class="hint">Кликни по тортику 10 раз, чтобы открыть сюрприз! 🎂</p>
        <div id="cake" class="cake-btn">🎂</div>
    </div>

    <div id="congrats-block" class="hidden">
        <h1 class="title">Happy Birthday! 🎉</h1>
        <p class="text">Ты прошла эту сложнейшую игру! Настоящая чемпионка! 🏆<br><br>
        С днем рождения, моя любимая лучшая подруга! Желаю тебе бесконечного счастья, улыбок и чтобы все твои мечты сбывались! ❤️✨</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<audio id="music" src="https://dl.musicdream.cc/files/masha_i_medved_-_pesenka_pro_den_rozhdeniya_(musicdream.cc).mp3" loop></audio>

<script>
    let score = 0;
    const targetScore = 10;
    const cake = document.getElementById('cake');
    const scoreDisplay = document.getElementById('score');
    const gameBlock = document.getElementById('game-block');
    const congratsBlock = document.getElementById('congrats-block');
    const music = document.getElementById('music');

    const emojis = ['🎂', '🧁', '🍰', '🍩', '🍪', '🍬'];

    cake.addEventListener('click', () => {
        score++;
        scoreDisplay.textContent = score;

        const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        cake.textContent = randomEmoji;

        if (score >= targetScore) {
            endGame();
        }
    });

    function endGame() {
        gameBlock.classList.add('hidden');
        congratsBlock.classList.remove('hidden');
        
        // Включаем музыку Маши
        music.play().catch(e => console.log("Ошибка воспроизведения аудио:", e));
        
        launchConfetti();
    }

    function launchConfetti() {
        let duration = 12 * 1000; // Конфетти будет сыпаться чуть дольше, под стать песне
        let animationEnd = Date.now() + duration;
        let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };

        let interval = setInterval(function() {
            let timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            let particleCount = 50 * (timeLeft / duration);
            
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
        }, 250);
    }
</script>
</body>
</html>
