<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif; overflow: hidden;
        }
        .container { text-align: center; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .title { font-size: 3.5rem; margin-bottom: 10px; animation: bounce 2s infinite; }
        .text { font-size: 1.5rem; margin-bottom: 30px; }
        button {
            padding: 15px 30px; font-size: 1.2rem; border: none; background: #fff;
            color: #ff6b6b; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.2s;
        }
        button:hover { transform: scale(1.1); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">Happy Birthday! 🎉</h1>
    <p class="text">С днем рождения, любимая подруга! ❤️</p>
    <button id="start">Открыть поздравление 🎁</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>
    const btn = document.getElementById('start');
    const music = document.getElementById('music');

    function launchConfetti() {
        let duration = 6 * 1000;
        let animationEnd = Date.now() + duration;
        let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };

        let interval = setInterval(function() {
            let timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            let particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
        }, 250);
    }

    btn.addEventListener('click', () => {
        music.play();
        launchConfetti();
        btn.style.display = 'none';
    });
</script>
</body>
</html>
